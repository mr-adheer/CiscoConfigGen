    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }
        .container {
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {text-align: center; margin-top: 0; color: #2c3e50; }

        .file-upload {
            margin-bottom: 20px;
            padding: 30px 15px;
            border: 2px dashed #bdc3c7;
            border-radius: 6px;
            text-align: center;
            background-color: #fafafa;
            transition: all 0.2s ease;
        }
        .file-upload.dragover { border-color: #3498db; background-color: #ebf5fb; }
        .upload-instruction { margin-bottom: 15px; color: #7f8c8d; }
        .success-msg { color: #27ae60; font-size: 0.9em; margin-top: 10px; display: none; font-weight: bold; }

        .table-container { overflow-x: auto; margin-bottom: 20px; display: none; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #f8f9fa; font-family: monospace; color: #2c3e50; white-space: nowrap; }
        input[type="text"] {
            width: 100%; padding: 8px; border: 1px solid #ccc;
            border-radius: 4px; box-sizing: border-box; font-family: monospace; min-width: 120px;
            transition: border-color 0.2s, background-color 0.2s;
        }

        /* Validation Styling */
        input.invalid-input {
            border-color: #e74c3c !important;
            background-color: #fdf2f0 !important;
            outline: none;
        }

        .btn {
            background-color: #3498db; color: white; border: none; padding: 10px 15px;
            cursor: pointer; border-radius: 4px; font-size: 14px; transition: background 0.3s;
        }
        .btn:hover { background-color: #2980b9; }
        .btn-danger { background-color: #e74c3c; }
        .btn-danger:hover { background-color: #c0392b; }
        .btn-success { background-color: #2ecc71; font-size: 16px; padding: 12px 20px; width: 100%; margin-top: 15px;}
        .btn-success:hover { background-color: #27ae60; }

        .action-row {
            display: flex; gap: 10px; margin-bottom: 15px; background: #f8f9fa;
            padding: 15px; border-radius: 6px; border: 1px solid #ddd; align-items: center;
        }
        .btn-secondary { background-color: #95a5a6; }
        .btn-secondary:hover { background-color: #7f8c8d; }
        .action-col { text-align: center; width: 60px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Configuration Generator</h2>

    <div class="file-upload" id="dropZone">
        <div class="upload-instruction">
            <strong>Drag and drop your Jinja template here</strong><br>
            or click the button below
        </div>
        <input type="file" id="fileInput" accept=".j2,.txt,.conf,.yaml,.yml" />
        <div id="fileLoadedMsg" class="success-msg">Template loaded successfully!</div>
    </div>

    <div id="workspace" class="table-container">
        <div class="action-row">
            <button class="btn" id="addRowBtn">+ Add Another Row (Copies Above)</button>
            <div style="flex-grow: 1;"></div>
            <button class="btn btn-secondary" id="exportCsvBtn">Export to CSV</button>
            <button class="btn btn-secondary" id="importCsvBtn">Import from CSV</button>
            <input type="file" id="csvInput" accept=".csv" style="display: none;" />
        </div>

        <table id="varsTable">
            <thead>
                <tr id="tableHeader"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <button class="btn btn-success" id="generateZipBtn">Generate & Download ZIP</button>
    </div>
</div>

<script>
    let templateContent = "";
    let extractedVariables = [];
    let defaultValues = {};
    let originalFilename = "output";

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileLoadedMsg = document.getElementById('fileLoadedMsg');
    const workspace = document.getElementById('workspace');
    const tableHeader = document.getElementById('tableHeader');
    const tableBody = document.getElementById('tableBody');
    const csvInput = document.getElementById('csvInput');

    // --- Utilities ---
    function getTimestamp() {
        const d = new Date();
        const pad = (n) => n.toString().padStart(2, '0');
        const YYYY = d.getFullYear();
        const MM = pad(d.getMonth() + 1);
        const DD = pad(d.getDate());
        const HH = pad(d.getHours());
        const mm = pad(d.getMinutes());
        const ss = pad(d.getSeconds());
        return `${YYYY}${MM}${DD}_${HH}${mm}${ss}`;
    }

    // Forcefully wipe all previous data and UI state
    function resetWorkspace() {
        templateContent = "";
        extractedVariables = [];
        defaultValues = {};
        tableHeader.innerHTML = '';
        tableBody.innerHTML = '';
        workspace.style.display = 'none';
        fileLoadedMsg.style.display = 'none';
        csvInput.value = '';
    }

    // --- Validation Logic ---
    function isValidIPv4(ip) {
        const regex = /^(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;
        return regex.test(ip);
    }

    function isValidSubnetMask(mask) {
        const validMasks = [
            '255.255.255.255', '255.255.255.254', '255.255.255.252', '255.255.255.248',
            '255.255.255.240', '255.255.255.224', '255.255.255.192', '255.255.255.128',
            '255.255.255.0', '255.255.254.0', '255.255.252.0', '255.255.248.0',
            '255.255.240.0', '255.255.224.0', '255.255.192.0', '255.255.128.0',
            '255.255.0.0', '255.254.0.0', '255.252.0.0', '255.248.0.0',
            '255.240.0.0', '255.224.0.0', '255.192.0.0', '255.128.0.0',
            '255.0.0.0', '254.0.0.0', '252.0.0.0', '248.0.0.0',
            '240.0.0.0', '224.0.0.0', '192.0.0.0', '128.0.0.0', '0.0.0.0'
        ];
        return validMasks.includes(mask);
    }

    function validateInput(input) {
        const varName = input.getAttribute('data-var');
        if (!varName) return true;

        let isValid = true;
        const val = input.value.trim();

        if (val !== "") {
            if (varName.includes('_IP')) {
                isValid = isValidIPv4(val);
            } else if (varName.includes('_MASK')) {
                isValid = isValidSubnetMask(val);
            }
        }

        if (!isValid) {
            input.classList.add('invalid-input');
            input.title = varName.includes('_IP') ? "Invalid IP Address format" : "Invalid Subnet Mask format";
        } else {
            input.classList.remove('invalid-input');
            input.title = "";
        }

        return isValid;
    }

    tableBody.addEventListener('input', function(e) {
        if (e.target.tagName === 'INPUT') {
            validateInput(e.target);
        }
    });

    // --- File Handling (Template) ---
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault(); dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', function(e) {
        if (e.target.files.length) handleFile(e.target.files[0]);
        e.target.value = ''; // Reset input so selecting the same file again works
    });

    function handleFile(file) {
        if (!file) return;

        resetWorkspace(); // Wipe old UI and variables clean

        originalFilename = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
        const reader = new FileReader();
        reader.onload = function(event) {
            templateContent = event.target.result;
            fileLoadedMsg.style.display = 'block';
            fileLoadedMsg.textContent = `Template Loaded: ${file.name}`;
            parseVariables(templateContent);
        };
        reader.readAsText(file);
    }

    // --- Variable Logic ---
    function parseVariables(text) {
        const regex = /\{\{\s*([a-zA-Z0-9_]+)(?:\s*\|\s*(?:default|d)\(['"]([^'"]+)['"]\))?\s*\}\}/g;
        const matches = [...text.matchAll(regex)];

        const varMap = new Map();
        matches.forEach(m => {
            const varName = m[1];
            const defaultVal = m[2] || "";
            if (!varMap.has(varName)) varMap.set(varName, defaultVal);
        });

        extractedVariables = Array.from(varMap.keys());
        defaultValues = Object.fromEntries(varMap);

        if (extractedVariables.length === 0) {
            alert("No variables found in this file.");
            workspace.style.display = 'none';
            return;
        }

        buildTableHeaders();
        tableBody.innerHTML = '';
        addRow();
        workspace.style.display = 'block';
    }

    function buildTableHeaders() {
        tableHeader.innerHTML = '';
        extractedVariables.forEach(variable => {
            const th = document.createElement('th');
            th.textContent = variable;
            tableHeader.appendChild(th);
        });
        tableHeader.innerHTML += '<th class="action-col">Action</th>';
    }

    function addRow(prefilledData = null) {
        const tr = document.createElement('tr');
        let rowHtml = '';

        const lastRow = tableBody.lastElementChild;
        extractedVariables.forEach(variable => {
            let valToUse = defaultValues[variable] || "";
            if (prefilledData && prefilledData[variable] !== undefined) {
                valToUse = prefilledData[variable];
            } else if (!prefilledData && lastRow) {
                const prevInput = lastRow.querySelector(`input[data-var="${variable}"]`);
                if (prevInput) valToUse = prevInput.value;
            }
            const safeVal = valToUse.replace(/"/g, '&quot;');
            rowHtml += `<td><input type="text" data-var="${variable}" value="${safeVal}" placeholder="Value..." /></td>`;
        });

        rowHtml += `<td class="action-col"><button class="btn btn-danger delete-btn">X</button></td>`;
        tr.innerHTML = rowHtml;
        tableBody.appendChild(tr);

        tr.querySelectorAll('input').forEach(input => validateInput(input));

        tr.querySelector('.delete-btn').addEventListener('click', function() {
            if (tableBody.children.length > 1) { tr.remove(); }
            else { alert("You must have at least one row."); }
        });
    }

    document.getElementById('addRowBtn').addEventListener('click', () => addRow(null));

    // --- CSV Utilities ---
    function splitCSV(str) {
        let result = [], cur = '', inQuotes = false;
        for (let i = 0; i < str.length; i++) {
            let char = str[i];
            if (char === '"') {
                if (inQuotes && str[i + 1] === '"') { cur += '"'; i++; }
                else { inQuotes = !inQuotes; }
            } else if (char === ',' && !inQuotes) {
                result.push(cur); cur = '';
            } else { cur += char; }
        }
        result.push(cur); return result;
    }

    function encodeCSV(str) {
        if (str.includes(',') || str.includes('"') || str.includes('\n')) {
            return `"${str.replace(/"/g, '""')}"`;
        }
        return str;
    }

    // --- Export/Import CSV ---
    document.getElementById('exportCsvBtn').addEventListener('click', function() {
        if (extractedVariables.length === 0) return;
        let headers = [...extractedVariables];
        let csvContent = headers.map(encodeCSV).join(",") + "\n";

        const rows = document.querySelectorAll('#tableBody tr');
        rows.forEach(row => {
            let rowData = [];
            extractedVariables.forEach(variable => {
                let val = row.querySelector(`input[data-var="${variable}"]`).value;
                rowData.push(encodeCSV(val));
            });
            csvContent += rowData.join(",") + "\n";
        });

        const blob = new Blob([csvContent], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `${originalFilename}_data.csv`;
        document.body.appendChild(a); a.click();
        document.body.removeChild(a); URL.revokeObjectURL(url);
    });

    document.getElementById('importCsvBtn').addEventListener('click', () => { document.getElementById('csvInput').click(); });
    csvInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const text = event.target.result;
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
            if (lines.length < 2) { alert("The CSV file is empty or missing data rows."); return; }

            const headers = splitCSV(lines[0]);
            tableBody.innerHTML = '';
            for (let i = 1; i < lines.length; i++) {
                const rowData = splitCSV(lines[i]);
                let rowDict = {};
                headers.forEach((header, index) => {
                    if (index < rowData.length) { rowDict[header.trim()] = rowData[index]; }
                });
                addRow(rowDict);
            }
            e.target.value = '';
        };
        reader.readAsText(file);
    });

    // --- ZIP Generation ---
    document.getElementById('generateZipBtn').addEventListener('click', function() {
        let hasValidationErrors = false;
        document.querySelectorAll('#tableBody input[data-var]').forEach(input => {
            if (!validateInput(input)) {
                hasValidationErrors = true;
            }
        });

        if (hasValidationErrors) {
            alert("Please correct the highlighted IP or Subnet Mask formats before generating the ZIP.");
            return;
        }

        const zip = new JSZip();
        const rows = document.querySelectorAll('#tableBody tr');
        const branchVariableKey = extractedVariables.find(v => v.toLowerCase().includes('branch'));
        const usedFilenames = new Set();

        const runTimestamp = getTimestamp();

        rows.forEach((row, index) => {
            let outputText = templateContent;

            extractedVariables.forEach(variable => {
                const inputElement = row.querySelector(`input[data-var="${variable}"]`);
                const val = inputElement ? inputElement.value : "";
                const replaceRegex = new RegExp(`\\{\\{\\s*${variable}(?:\\s*\\|\\s*(?:default|d)\\(['"][^'"]+['"]\\))?\\s*\\}\\}`, 'g');
                outputText = outputText.replace(replaceRegex, val);
            });

            let baseName = `${originalFilename}_${index + 1}`;
            if (branchVariableKey) {
                const branchInput = row.querySelector(`input[data-var="${branchVariableKey}"]`);
                if (branchInput && branchInput.value.trim() !== "") {
                    baseName = branchInput.value.trim();
                }
            }

            if (baseName.endsWith('.txt')) {
                baseName = baseName.substring(0, baseName.length - 4);
            }

            let finalName = baseName;
            let counter = 1;
            while (usedFilenames.has(finalName.toLowerCase())) {
                counter++;
                finalName = `${baseName}_${counter}`;
            }

            usedFilenames.add(finalName.toLowerCase());
            let filenameWithTimestamp = `${finalName}_${runTimestamp}.txt`;

            zip.file(filenameWithTimestamp, outputText);
        });

        zip.generateAsync({ type: "blob" })
            .then(function(content) {
                const url = URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${originalFilename}_bulk_${runTimestamp}.zip`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            })
            .catch(function(err) {
                console.error("Error generating ZIP:", err);
                alert("Failed to generate ZIP file.");
            });
    });
</script>
